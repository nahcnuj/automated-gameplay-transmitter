name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find latest successful CD run for HEAD
        id: cd_run
        run: |
          HEAD_SHA=$(git rev-parse HEAD)
          RUN_ID=$(gh run list \
            --workflow cd.yml \
            --branch main \
            --status success \
            --limit 20 \
            --json databaseId,headSha \
            | jq -r --arg sha "$HEAD_SHA" \
            '.[] | select(.headSha == $sha) | .databaseId' \
            | head -1)
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No successful CD run found for HEAD commit ${HEAD_SHA}" >&2
            exit 1
          fi
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./
          github-token: ${{ github.token }}
          run-id: ${{ steps.cd_run.outputs.run_id }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: bump-version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          sed -i "s/^  \"version\": \".*\"/  \"version\": \"${NEW_VERSION}\"/" package.json
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git add package.json
          git commit -m "Release v${{ steps.bump-version.outputs.version }}"
          git push origin HEAD:main

      - name: Create tag
        run: |
          git tag "v${{ steps.bump-version.outputs.version }}"
          git push origin "v${{ steps.bump-version.outputs.version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ steps.bump-version.outputs.version }}"
          name: "v${{ steps.bump-version.outputs.version }}"
          generate_release_notes: true
